name: "Build and Release"

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., v1.0.0)"
        required: false
        type: string
      prerelease:
        description: "Mark as prerelease"
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

jobs:
  # 代码质量检查
  lint-and-build:
    name: Lint and Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Lint
        run: pnpm run lint || echo "Lint script not found, skipping..."

      - name: Build frontend
        run: pnpm run build

  publish-tauri:
    name: Build and Release Tauri (${{ matrix.platform }})
    permissions:
      contents: write
    needs: [lint-and-build]
    if: always() && (needs.lint-and-build.result == 'success' || needs.lint-and-build.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-15"
          - platform: "ubuntu-22.04"
          - platform: "windows-latest"
    runs-on: ${{ matrix.platform }}
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Get version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.version }}" != "" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "version=v$(date +'%Y.%m.%d')-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Install system dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile --prefer-offline

      - name: Sync version to app configs
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          export VERSION
          node <<'NODE'
          const fs = require('fs');

          const v = process.env.VERSION;
          if (!v) {
            throw new Error('VERSION is empty');
          }

          const pkgPath = 'package.json';
          const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
          pkg.version = v;
          fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2) + '\n');

          const tauriPath = 'src-tauri/tauri.conf.json';
          const tauri = JSON.parse(fs.readFileSync(tauriPath, 'utf8'));
          tauri.version = v;
          fs.writeFileSync(tauriPath, JSON.stringify(tauri, null, 2) + '\n');

          const cargoPath = 'src-tauri/Cargo.toml';
          const cargo = fs.readFileSync(cargoPath, 'utf8');
          const cargoNext = cargo.replace(/^(version\s*=\s*")[^"]+("\s*)$/m, (_m, p1, p2) => p1 + v + p2);
          if (cargoNext === cargo) {
            throw new Error('Cargo.toml version line not found');
          }
          fs.writeFileSync(cargoPath, cargoNext);
          NODE

      - name: Build Tauri app
        env:
          NODE_ENV: production
        run: pnpm run tauri:build

      - name: Get release info
        id: release_info
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION="${VERSION#v}"
          TAG_NAME="${{ steps.version.outputs.version }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
          echo "release_name=Kit ${VERSION}" >> $GITHUB_OUTPUT

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v1
        with:
          files: |
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.app.tar.gz
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
            src-tauri/target/release/bundle/**/*.rpm
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.zip
          tag_name: ${{ steps.release_info.outputs.tag_name }}
          name: ${{ steps.release_info.outputs.release_name }}
          body: |
            Release ${{ steps.release_info.outputs.release_name }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.
          draft: false
          prerelease: ${{ github.event.inputs.prerelease == 'true' }}
          make_latest: ${{ matrix.platform == 'macos-15' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
